<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News Search App</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#6a11cb,#9b59b6);
margin:0;
padding:40px;
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
}

.search-box{
margin-bottom:30px;
}

input{
padding:12px;
width:280px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#5e2ca5;
color:white;
font-size:16px;
cursor:pointer;
margin-left:5px;
transition:0.3s;
}

button:hover{
background:#4b1d87;
transform:scale(1.05);
}

#results{
margin-top:30px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.article{
background:white;
color:#333;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.article:hover{
transform:translateY(-5px);
}

.article img{
width:100%;
height:180px;
object-fit:cover;
}

.article-content{
padding:15px;
text-align:left;
}

.article-content h3{
font-size:18px;
margin-bottom:10px;
}

.article-content p{
font-size:14px;
color:#666;
}

.article-content a{
display:inline-block;
margin-top:10px;
text-decoration:none;
background:#6a11cb;
color:white;
padding:8px 12px;
border-radius:6px;
font-size:14px;
}

.loading{
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>📰 News Search App</h1>

<div class="search-box">
<input type="text" id="keyword" placeholder="Cari berita...">
<button onclick="searchNews()">Search</button>
</div>

<div id="results"></div>

<script>

const apiKey = "d10177f4d3ec405cba79d184480faccc";

function searchNews(){

const keyword = document.getElementById("keyword").value;

document.getElementById("results").innerHTML =
"<div class='loading'>Loading berita...</div>";

const url =
`https://newsapi.org/v2/everything?q=${keyword}&language=id&sortBy=relevancy&apiKey=${apiKey}`;
fetch(url)
.then(response => response.json())
.then(data => {

let output="";

data.articles.forEach(article => {

output += `
<div class="article">

<img src="${article.urlToImage || 'https://via.placeholder.com/400x200'}">

<div class="article-content">

<h3>${article.title}</h3>

<p>${article.description || "Tidak ada deskripsi."}</p>

<a href="${article.url}" target="_blank">Baca Selengkapnya</a>

</div>

</div>
`;

});

document.getElementById("results").innerHTML = output;

});

}



</script>


</body>
</html>
